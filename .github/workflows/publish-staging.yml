name: Deploy staging branch to GitHub Pages (staging)

env:
  WC_HUGO_VERSION: '0.136.5'

on:
  push:
    branches: ["staging"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:

    - name: Checkout staging branch
      uses: actions/checkout@v4
      with:
        ref: staging
        fetch-depth: 0

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: ${{ env.WC_HUGO_VERSION }}
        extended: true

    - uses: actions/cache@v4
      with:
        path: /tmp/hugo_cache_runner/
        key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-hugomod-

    - name: Build with Hugo (staging baseURL)
      env:
        HUGO_ENVIRONMENT: staging
      run: |
        hugo --minify --baseURL "https://jacob-haimes.github.io/kairos.fm/staging/"

    - name: Generate Pagefind search index
      run: npx pagefind --source "public"

    - name: Inject password gate
      env:
        STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
      run: |
        HASH=$(echo -n "$STAGING_PASSWORD" | sha256sum | awk '{print $1}')
        cat > public/password-gate.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
          <title>Staging Preview — Enter Password</title>
          <style>
            body { font-family: sans-serif; display: flex; align-items: center;
                   justify-content: center; height: 100vh; margin: 0; background: #111; color: #eee; }
            input { padding: 10px; font-size: 1rem; border-radius: 4px; border: none; margin-right: 8px; }
            button { padding: 10px 18px; font-size: 1rem; border-radius: 4px;
                     background: #e05; color: white; border: none; cursor: pointer; }
            p { color: #f66; }
          </style>
        </head>
        <body>
          <div>
            <h2>Staging Preview</h2>
            <input type="password" id="pw" placeholder="Enter password" />
            <button onclick="check()">Enter</button>
            <p id="err" style="display:none">Incorrect password</p>
          </div>
          <script>
            const HASH = "PLACEHOLDER_HASH";
            async function sha256(msg) {
              const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
              return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
            }
            async function check() {
              const val = document.getElementById("pw").value;
              const h = await sha256(val);
              if (h === HASH) {
                sessionStorage.setItem("staging_auth", "1");
                window.location.href = "./index.html";
              } else {
                document.getElementById("err").style.display = "block";
              }
            }
            document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") check(); });
          </script>
        </body>
        </html>
        EOF
        # Inject the real hash
        sed -i "s/PLACEHOLDER_HASH/$HASH/" public/password-gate.html

        # Prepend auth check to every HTML page
        find public -name "*.html" ! -name "password-gate.html" | while read f; do
          sed -i 's|<head>|<head><script>if(!sessionStorage.getItem("staging_auth"))window.location.href="/staging/password-gate.html";</script>|' "$f"
        done

    - name: Deploy to kairos.fm-staging repo
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ secrets.STAGING_DEPLOY_TOKEN }}
        external_repository: jacob-haimes/kairos.fm-staging
        publish_branch: gh-pages
        publish_dir: ./public
